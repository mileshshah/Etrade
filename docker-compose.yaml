services:
  etrade-backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./config_sandbox.json:/app/config_sandbox.json
      - ./config_prod.json:/app/config_prod.json
    environment:
      - PYTHONUNBUFFERED=1

  etrade-frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    ports:
      - "80:80"
    depends_on:
      - etrade-backend
