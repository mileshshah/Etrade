server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend (using the service name 'etrade-backend')
    location /auth/ {
        proxy_pass http://etrade-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /accounts {
        proxy_pass http://etrade-backend:8000;
        proxy_set_header Host $host;
    }

    location /portfolio/ {
        proxy_pass http://etrade-backend:8000;
        proxy_set_header Host $host;
    }

    location /order/ {
        proxy_pass http://etrade-backend:8000;
        proxy_set_header Host $host;
    }

    location /gemini/ {
        proxy_pass http://etrade-backend:8000;
        proxy_set_header Host $host;
    }

    location /status {
        proxy_pass http://etrade-backend:8000;
        proxy_set_header Host $host;
    }
}
